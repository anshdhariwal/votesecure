{% extends "base.html" %}
{% load static %}
{% block title %}Forgot Password — VoteSecure India{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-background px-4">
<div class="w-full max-w-md">
<div class="text-center mb-10">
<a href="{% url 'homepage' %}" class="text-3xl font-serif font-bold text-on-surface tracking-tight">VoteSecure</a>
</div>

<div class="bg-surface-container rounded-xl p-card-padding border border-outline-variant/30 shadow-2xl shadow-black/50">
<h2 class="font-display-md text-display-md text-on-surface mb-2">Reset Password</h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-8">Enter your registered email address and we'll send you a reset link.</p>

<form method="POST" action="{% url 'forgot_password' %}">
    {% csrf_token %}
    <div class="space-y-6">
        <div>
            <label class="font-label-caps text-label-caps text-on-surface-variant block mb-2 uppercase tracking-widest">EMAIL ADDRESS</label>
            <input type="email" name="email" class="w-full bg-surface-dim border border-surface-container-highest text-on-surface rounded p-3 font-body-md text-body-md focus:border-primary focus:ring-0 outline-none transition-colors" placeholder="Enter your registered email" required/>
        </div>
        <button type="submit" class="w-full bg-primary text-on-primary font-body-md text-body-md py-4 rounded-full hover:opacity-90 transition-opacity font-semibold">
            Send Reset Link
        </button>
    </div>
</form>

<div class="mt-8 text-center">
    <a href="{% url 'login' %}" class="text-sm text-on-surface-variant hover:text-on-surface transition-colors flex items-center justify-center gap-1">
        <span class="material-symbols-outlined text-[16px]">arrow_back</span> Back to Login
    </a>
</div>
</div>
</div>
</div>
{% endblock %}
